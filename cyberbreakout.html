<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CYBER BREAKER</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0015;
    font-family: 'Courier New', monospace;
    color: #0ff;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    touch-action: none;
  }
  #game {
    position: relative;
    width: 100%;
    max-width: 400px;
    height: 600px;
    background: #000;
    border: 3px solid #0ff;
    box-shadow: 0 0 30px #0ff, inset 0 0 20px #0ff33;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    text-shadow: 0 0 10px #0ff;
    z-index: 10;
    pointer-events: none;
  }
  #ui span { color: #f0f; text-shadow: 0 0 10px #f0f; }
  #menu {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    text-align: center;
  }
 .title {
    font-size: 32px;
    color: #fff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
    margin-bottom: 20px;
    animation: flicker 2s infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; text-shadow: 0 0 20px #f0f, 0 0 40px #0ff; }
  }
 .subtitle { font-size: 12px; color: #0ff; margin: 5px 0; }
  button {
    background: transparent;
    border: 2px solid #0ff;
    color: #0ff;
    padding: 10px 30px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 0 15px #0ff;
  }
  button:active { background: #0ff; color: #000; }
  #controls {
    position: absolute;
    bottom: 0; width: 100%; height: 70px;
    display: none;
    z-index: 15;
  }
 .btn {
    position: absolute;
    width: 100px; height: 50px;
    border: 2px solid #0ff;
    background: rgba(0,255,255,0.1);
    bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    user-select: none;
  }
 .btn:active { background: rgba(0,255,255,0.3); }
  #left { left: 20px; }
  #right { right: 20px; }
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>
  <div id="ui">
    <div>SCORE:<span id="s">0</span></div>
    <div>LIVES:<span id="l">3</span></div>
    <div>LEVEL:<span id="lv">1</span></div>
  </div>
  <div id="controls">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="right">▶</div>
  </div>
  <div id="menu">
    <div class="title">CYBER BREAKER</div>
    <div class="subtitle">> ATARI NEON PROTOCOL</div>
    <div class="subtitle">> TOQUE OU ESPAÇO PRA LANÇAR</div>
    <div class="subtitle">> DESTRUA TODOS OS BLOCOS</div>
    <button id="start">START GAME</button>
  </div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const sEl = document.getElementById('s');
const lEl = document.getElementById('l');
const lvEl = document.getElementById('lv');
const menu = document.getElementById('menu');
const controls = document.getElementById('controls');

c.width = 400;
c.height = 600;

let game = null;
let leftPressed = false, rightPressed = false;

document.getElementById('start').onclick = () => {
  menu.style.display = 'none';
  controls.style.display = 'block';
  startGame();
};

document.getElementById('left').addEventListener('touchstart', e => { e.preventDefault(); leftPressed = true; });
document.getElementById('left').addEventListener('touchend', e => { e.preventDefault(); leftPressed = false; });
document.getElementById('right').addEventListener('touchstart', e => { e.preventDefault(); rightPressed = true; });
document.getElementById('right').addEventListener('touchend', e => { e.preventDefault(); rightPressed = false; });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') leftPressed = true;
  if (e.key === 'ArrowRight' || e.key === 'd') rightPressed = true;
  if (e.code === 'Space' && game && game.ball &&!game.ball.launched) game.ball.launched = true;
});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') leftPressed = false;
  if (e.key === 'ArrowRight' || e.key === 'd') rightPressed = false;
});

c.addEventListener('touchstart', e => {
  e.preventDefault();
  if (game && game.ball &&!game.ball.launched) game.ball.launched = true;
});

c.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!game) return;
  const rect = c.getBoundingClientRect();
  const x = (e.touches[0].clientX - rect.left) * (c.width / rect.width);
  game.paddle.x = Math.max(0, Math.min(c.width - game.paddle.w, x - game.paddle.w / 2));
});

function startGame() {
  game = {
    score: 0,
    lives: 3,
    level: 1,
    running: true,
    paddle: { x: 160, y: 550, w: 80, h: 10, speed: 7 },
    ball: { x: 200, y: 300, r: 5, vx: 0, vy: 0, launched: false, speed: 5 },
    bricks: [],
    particles: []
  };
  createLevel();
  updateUI();
  loop();
}

function createLevel() {
  game.bricks = [];
  const rows = 5 + game.level;
  const cols = 10;
  const colors = ['#0ff', '#f0f', '#ff0', '#0f0', '#f80', '#80f'];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      game.bricks.push({
        x: 5 + c * 39,
        y: 60 + r * 20,
        w: 35,
        h: 15,
        color: colors[r % colors.length],
        alive: true
      });
    }
  }
}

function updateUI() {
  sEl.textContent = game.score;
  lEl.textContent = game.lives;
  lvEl.textContent = game.level;
}

function resetBall() {
  game.ball.x = game.paddle.x + game.paddle.w / 2;
  game.ball.y = game.paddle.y - game.ball.r - 2;
  game.ball.vx = game.ball.speed * (Math.random() > 0.5? 1 : -1);
  game.ball.vy = -game.ball.speed;
  game.ball.launched = false;
}

function createParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    game.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 20,
      color,
      size: Math.random() * 3 + 1
    });
  }
}

function update() {
  if (!game ||!game.running) return;

  // Paddle
  if (leftPressed) game.paddle.x = Math.max(0, game.paddle.x - game.paddle.speed);
  if (rightPressed) game.paddle.x = Math.min(c.width - game.paddle.w, game.paddle.x + game.paddle.speed);

  // Ball
  if (!game.ball.launched) {
    game.ball.x = game.paddle.x + game.paddle.w / 2;
    game.ball.y = game.paddle.y - game.ball.r - 2;
  } else {
    game.ball.x += game.ball.vx;
    game.ball.y += game.ball.vy;

    // Walls
    if (game.ball.x - game.ball.r <= 0 || game.ball.x + game.ball.r >= c.width) {
      game.ball.vx *= -1;
    }
    if (game.ball.y - game.ball.r <= 0) {
      game.ball.vy *= -1;
    }

    // Paddle collision
    if (game.ball.y + game.ball.r >= game.paddle.y &&
        game.ball.x >= game.paddle.x &&
        game.ball.x <= game.paddle.x + game.paddle.w &&
        game.ball.vy > 0) {
      const hitPos = (game.ball.x - game.paddle.x) / game.paddle.w;
      const angle = (hitPos - 0.5) * Math.PI / 2.5;
      const speed = game.ball.speed + game.level * 0.2;
      game.ball.vx = speed * Math.sin(angle);
      game.ball.vy = -speed * Math.cos(angle);
    }

    // Bottom
    if (game.ball.y - game.ball.r > c.height) {
      game.lives--;
      updateUI();
      if (game.lives <= 0) {
        gameOver();
        return;
      }
      resetBall();
    }

    // Bricks
    for (let i = 0; i < game.bricks.length; i++) {
      const b = game.bricks[i];
      if (!b.alive) continue;
      if (game.ball.x + game.ball.r > b.x &&
          game.ball.x - game.ball.r < b.x + b.w &&
          game.ball.y + game.ball.r > b.y &&
          game.ball.y - game.ball.r < b.y + b.h) {
        b.alive = false;
        game.score += 10;
        updateUI();
        createParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);

        const dx = game.ball.x - (b.x + b.w / 2);
        const dy = game.ball.y - (b.y + b.h / 2);
        if (Math.abs(dx) > Math.abs(dy)) game.ball.vx *= -1;
        else game.ball.vy *= -1;
        break;
      }
    }

    // Check win
    if (game.bricks.every(b =>!b.alive)) {
      game.level++;
      game.ball.speed += 0.3;
      updateUI();
      createLevel();
      resetBall();
    }
  }

  // Particles
  game.particles = game.particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    return p.life > 0;
  });
}

function draw() {
  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, c.width, c.height);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,255,0.1)';
  ctx.lineWidth = 1;
  for (let i = 0; i < c.width; i += 20) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, c.height);
    ctx.stroke();
  }
  for (let i = 0; i < c.height; i += 20) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(c.width, i);
    ctx.stroke();
  }

  if (!game) return;

  // Bricks
  game.bricks.forEach(b => {
    if (!b.alive) return;
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 15;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  });

  // Paddle
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 20;
  ctx.fillRect(game.paddle.x, game.paddle.y, game.paddle.w, game.paddle.h);

  // Ball
  ctx.beginPath();
  ctx.arc(game.ball.x, game.ball.y, game.ball.r, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 20;
  ctx.fill();

  // Particles
  game.particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 20;
    ctx.fillRect(p.x, p.y, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function loop() {
  if (!game ||!game.running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

function gameOver() {
  game.running = false;
  controls.style.display = 'none';
  setTimeout(() => {
    menu.style.display = 'flex';
    menu.querySelector('.title').textContent = 'GAME OVER';
    menu.querySelector('.subtitle').textContent = `FINAL SCORE: ${game.score}`;
  }, 500);
}

// Init
loadRanking();
function loadRanking() {
  const rank = JSON.parse(localStorage.getItem('cyberBreaker') || '[]');
  document.getElementById('ranking').innerHTML = rank.length?
    'TOP: ' + rank.slice(0,3).join(' | ') : '';
}

window.addEventListener('beforeunload', () => {
  if (game && game.score > 0) {
    let rank = JSON.parse(localStorage.getItem('cyberBreaker') || '[]');
    rank.push(game.score);
    rank.sort((a,b) => b - a);
    rank = rank.slice(0,5);
    localStorage.setItem('cyberBreaker', JSON.stringify(rank));
  }
});
</script>
</body>
</html>
