<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CYBER BREAKER NEO</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: 'Courier New', 'Inter', monospace;
    color: #fff;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    touch-action: none;
  }
  #game {
    position: relative;
    width: 100%;
    max-width: 420px;
    height: 640px;
    background: #000;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0, 255, 255, 0.4), 0 0 120px rgba(255, 0, 255, 0.2);
  }
  #bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=2070') center/cover;
    filter: brightness(0.35) saturate(1.8) blur(1px);
    transform: scale(1.05);
    z-index: 0;
  }
  #bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 35%, rgba(0,0,0,0.1) 65%, rgba(0,0,0,0.9) 100%);
  }

  /* SCANLINES CRT */
  #scanlines {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
    z-index: 3;
    animation: scanlineMove 8s linear infinite;
  }
  @keyframes scanlineMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(10px); }
  }

  /* RUÍDO CRT */
  #crtNoise {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.02"/></svg>');
    pointer-events: none;
    z-index: 4;
    opacity: 0.4;
    animation: noiseFlicker 0.2s infinite;
  }
  @keyframes noiseFlicker {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.3; }
  }

  /* VIGNETTE CRT */
  #game::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 5;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
    filter: contrast(1.1) saturate(1.2);
  }
  #ui {
    position: absolute; top: 15px; left: 15px; right: 15px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; font-weight: 700; z-index: 10; pointer-events: none;
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0,255,255,0.8), 2px 0 0 rgba(255,0,0,0.5), -2px 0 0 rgba(0,255,255,0.5);
  }
.ui-card {
    background: rgba(0,255,255,0.03);
    backdrop-filter: blur(12px);
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid rgba(0,255,255,0.2);
  }
.ui-card span {
    color: #0ff;
    font-weight: 700;
    text-shadow: 0 0 8px #0ff;
  }
  #bossHp {
    position: absolute; top: 55px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 8px; display: none;
    background: rgba(255,0,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    z-index: 10;
    border: 1px solid rgba(255,0,255,0.3);
  }
  #bossHpBar {
    height: 100%;
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    box-shadow: 0 0 15px #ff00ff;
    transition: width 0.2s;
  }
  #menu {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 20; text-align: center;
  }
.title {
    font-size: 40px;
    font-weight: 900;
    color: #0ff;
    margin-bottom: 8px;
    letter-spacing: -2px;
    text-shadow:
      0 0 10px #0ff,
      3px 0 0 rgba(255,0,0,0.7),
      -3px 0 0 rgba(0,255,255,0.7),
      0 0 20px #0ff;
    animation: glitch 2s infinite;
    position: relative;
  }
  @keyframes glitch {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
  }
.title::before,.title::after {
    content: 'CYBER BREAKER';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
.title::before {
    color: #f0f;
    z-index: -1;
    animation: glitchBefore 3s infinite;
  }
.title::after {
    color: #0ff;
    z-index: -2;
    animation: glitchAfter 2.5s infinite;
  }
  @keyframes glitchBefore {
    0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    20% { clip-path: inset(20% 0 30% 0); transform: translate(-3px); }
    40% { clip-path: inset(50% 0 20% 0); transform: translate(3px); }
    60% { clip-path: inset(10% 0 60% 0); transform: translate(-2px); }
  }
  @keyframes glitchAfter {
    0%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    30% { clip-path: inset(60% 0 10% 0); transform: translate(2px); }
    50% { clip-path: inset(20% 0 50% 0); transform: translate(-2px); }
    70% { clip-path: inset(40% 0 30% 0); transform: translate(3px); }
  }
.subtitle {
    font-size: 10px;
    color: rgba(0,255,255,0.7);
    margin: 4px 0;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 5px #0ff;
  }
  button {
    background: rgba(0,255,255,0.05);
    border: 2px solid #0ff;
    color: #0ff;
    padding: 12px 32px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 25px;
    border-radius: 2px;
    transition: all 0.1s;
    letter-spacing: 2px;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.1);
  }
  button:hover {
    background: rgba(0,255,255,0.15);
    box-shadow: 0 0 25px rgba(0,255,255,0.6), inset 0 0 25px rgba(0,255,255,0.2);
    transform: translateY(-1px);
  }
  button:active { transform: translateY(0); }
  #controls {
    position: absolute; bottom: 0; width: 100%; height: 70px;
    display: none; z-index: 15;
  }
.btn {
    position: absolute; width: 90px; height: 45px;
    background: rgba(0,255,255,0.03);
    border: 2px solid rgba(0,255,255,0.3);
    border-radius: 4px;
    bottom: 15px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; user-select: none; color: rgba(0,255,255,0.8);
    transition: all 0.1s;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
  }
.btn:active {
    background: rgba(0,255,255,0.2);
    transform: scale(0.95);
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
  }
  #left { left: 20px; }
  #right { right: 20px; }
  #mute {
    position: absolute; top: 15px; right: 15px; z-index: 15;
    background: rgba(0,255,255,0.03);
    border: 1px solid rgba(0,255,255,0.3);
    color: rgba(0,255,255,0.8);
    width: 32px; height: 32px;
    border-radius: 2px;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-shadow: 0 0 5px #0ff;
  }
  #music {
    position: absolute; top: 15px; right: 55px; z-index: 15;
    background: rgba(0,255,255,0.15);
    border: 1px solid #0ff;
    color: #0ff;
    width: 32px; height: 32px;
    border-radius: 2px;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 10px rgba(0,255,255,0.4);
  }
</style>
</head>
<body>
<div id="game">
  <div id="bg"></div>
  <div id="scanlines"></div>
  <div id="crtNoise"></div>
  <canvas id="c"></canvas>
  <button id="music">◼</button>
  <button id="mute">♪</button>
  <div id="ui">
    <div class="ui-card">SCORE <span id="s">0</span></div>
    <div class="ui-card">LIVES <span id="l">3</span></div>
    <div class="ui-card">LEVEL <span id="lv">1</span>/5</div>
  </div>
  <div id="bossHp"><div id="bossHpBar"></div></div>
  <div id="controls">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="right">▶</div>
  </div>
  <div id="menu">
    <div class="title">CYBER BREAKER</div>
    <div class="subtitle">Chiptune Core v4.4</div>
    <div class="subtitle">A/D ou ◀▶ | L = Laser | M = Multiball</div>
    <button id="start">ENTER</button>
  </div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const sEl = document.getElementById('s');
const lEl = document.getElementById('l');
const lvEl = document.getElementById('lv');
const menu = document.getElementById('menu');
const controls = document.getElementById('controls');
const bossHp = document.getElementById('bossHp');
const bossHpBar = document.getElementById('bossHpBar');
const muteBtn = document.getElementById('mute');
const musicBtn = document.getElementById('music');

c.width = 420;
c.height = 640;

let game = null;
let leftPressed = false, rightPressed = false;
let audioCtx = null, isMuted = false, musicOn = true;
let musicNodes = null, autoLaunchTimer = null;

function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, dur, vol = 0.15, type = 'square') {
  if (!audioCtx || isMuted) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playHit() { beep(300, 0.03, 0.1, 'square'); }
function playBreak() { beep(200, 0.05, 0.12, 'square'); }
function playDamage() { beep(100, 0.15, 0.15, 'square'); }
function playLaser() { beep(600, 0.05, 0.08, 'square'); }
function playPowerUp() { beep(400, 0.08, 0.1, 'square'); setTimeout(() => beep(600, 0.08, 0.1, 'square'), 60); }

function startMusic() {
  if (!audioCtx || musicNodes ||!musicOn) return;
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.08;
  masterGain.connect(audioCtx.destination);

  const bass = audioCtx.createOscillator();
  const bassGain = audioCtx.createGain();
  bass.type = 'square';
  bass.frequency.value = 98;
  bassGain.gain.value = 0.25;
  bass.connect(bassGain).connect(masterGain);
  bass.start();

  const lead = audioCtx.createOscillator();
  const leadGain = audioCtx.createGain();
  lead.type = 'square';
  leadGain.gain.value = 0;
  lead.connect(leadGain).connect(masterGain);
  lead.start();

  const noise = audioCtx.createBufferSource();
  const noiseGain = audioCtx.createGain();
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  noise.buffer = buffer;
  noise.loop = true;
  noiseGain.gain.value = 0;
  noise.connect(noiseGain).connect(masterGain);
  noise.start();

  const notes = [392, 440, 494, 392, 330, 294, 330, 392];
  let noteIndex = 0;
  let beat = 0;

  const seqLoop = setInterval(() => {
    if (!musicOn ||!audioCtx) {
      clearInterval(seqLoop);
      return;
    }

    lead.frequency.setValueAtTime(notes[noteIndex], audioCtx.currentTime);
    leadGain.gain.cancelScheduledValues(audioCtx.currentTime);
    leadGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    leadGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

    if (beat % 2 === 1) {
      noiseGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
    }

    if (beat % 4 === 0) {
      bass.frequency.setValueAtTime(notes[noteIndex] / 4, audioCtx.currentTime);
    }

    noteIndex = (noteIndex + 1) % notes.length;
    beat++;
  }, 220);

  musicNodes = { bass, lead, noise, masterGain, seqLoop };
}

function stopMusic() {
  if (musicNodes) {
    clearInterval(musicNodes.seqLoop);
    try {
      musicNodes.bass.stop();
      musicNodes.lead.stop();
      musicNodes.noise.stop();
    } catch(e) {}
    musicNodes = null;
  }
}

muteBtn.onclick = () => {
  initAudio();
  isMuted =!isMuted;
  muteBtn.textContent = isMuted? '×' : '♪';
};

musicBtn.onclick = () => {
  initAudio();
  musicOn =!musicOn;
  musicBtn.textContent = musicOn? '◼' : '♫';
  musicBtn.style.background = musicOn? 'rgba(0,255,255,0.15)' : 'rgba(255,255,255,0.04)';
  if (musicOn) startMusic();
  else stopMusic();
};

document.getElementById('start').onclick = () => {
  initAudio();
  if (musicOn) startMusic();
  menu.style.display = 'none';
  controls.style.display = 'block';
  startGame();
};

document.getElementById('left').addEventListener('touchstart', e => { e.preventDefault(); leftPressed = true; });
document.getElementById('left').addEventListener('touchend', e => { e.preventDefault(); leftPressed = false; });
document.getElementById('right').addEventListener('touchstart', e => { e.preventDefault(); rightPressed = true; });
document.getElementById('right').addEventListener('touchend', e => { e.preventDefault(); rightPressed = false; });

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if (key === 'arrowleft' || key === 'a') leftPressed = true;
  if (key === 'arrowright' || key === 'd') rightPressed = true;
  if (e.code === 'Space') launch();
});
document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();
  if (key === 'arrowleft' || key === 'a') leftPressed = false;
  if (key === 'arrowright' || key === 'd') rightPressed = false;
});

window.addEventListener('blur', () => {
  leftPressed = false;
  rightPressed = false;
});

c.addEventListener('touchstart', e => { e.preventDefault(); launch(); });
c.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!game) return;
  const rect = c.getBoundingClientRect();
  const x = (e.touches[0].clientX - rect.left) * (c.width / rect.width);
  game.paddle.x = Math.max(0, Math.min(c.width - game.paddle.w, x - game.paddle.w / 2));
});

function launch() {
  if (game && game.balls.length > 0 &&!game.balls[0].launched) {
    game.balls.forEach(ball => {
      ball.launched = true;
      ball.vx = 4.5 * (Math.random() > 0.5? 1 : -1);
      ball.vy = -4.5;
    });
    if (autoLaunchTimer) clearTimeout(autoLaunchTimer);
  }
}

function startGame() {
  game = {
    score: 0,
    lives: 3,
    level: 1,
    running: true,
    paddle: { x: 165, y: 580, w: 90, h: 12, speed: 7 },
    balls: [{ x: 210, y: 300, r: 6, vx: 0, vy: 0, launched: false, trail: [] }],
    bricks: [],
    powerups: [],
    lasers: [],
    boss: null,
    particles: []
  };
  createLevel();
  resetBalls();
  updateUI();
  autoLaunchTimer = setTimeout(() => { if (game && game.balls.length > 0 &&!game.balls[0].launched) launch(); }, 3000);
  loop();
}

function createLevel() {
  game.bricks = [];
  game.boss = null;
  bossHp.style.display = 'none';

  if (game.level === 5) {
    game.boss = { x: 110, y: 100, w: 200, h: 50, hp: 15, maxHp: 15, dir: 1, alive: true };
    bossHp.style.display = 'block';
    updateBossHp();
    return;
  }

  const rows = 4 + game.level;
  const colors = ['#00ffff', '#ff00ff', '#00ff88', '#ff8800', '#8800ff'];
  for (let r = 0; r < rows; r++) {
    for (let col = 0; col < 10; col++) {
      game.bricks.push({
        x: 10 + col * 40,
        y: 70 + r * 22,
        w: 36,
        h: 18,
        alive: true,
        color: colors[r % colors.length],
        hp: r < 2? 2 : 1
      });
    }
  }
}

function updateBossHp() {
  if (game.boss) {
    bossHpBar.style.width = (game.boss.hp / game.boss.maxHp * 100) + '%';
  }
}

function updateUI() {
  sEl.textContent = game.score;
  lEl.textContent = game.lives;
  lvEl.textContent = game.level;
}

function resetBalls() {
  game.balls = [{ x: game.paddle.x + game.paddle.w / 2, y: game.paddle.y - 8, r: 6, vx: 0, vy: 0, launched: false, trail: [] }];
  if (autoLaunchTimer) clearTimeout(autoLaunchTimer);
  autoLaunchTimer = setTimeout(() => { if (game && game.balls.length > 0 &&!game.balls[0].launched) launch(); }, 3000);
}

function spawnPowerUp(x, y) {
  const rand = Math.random();
  if (rand < 0.12) {
    game.powerups.push({ x, y, type: 'L', vy: 2.5, w: 24, h: 12, color: '#ff0' });
  } else if (rand < 0.22) {
    game.powerups.push({ x, y, type: 'M', vy: 2.5, w: 24, h: 12, color: '#0ff' });
  }
}

function spawnMultiball() {
  if (game.balls.length >= 5) return;
  const baseBall = game.balls[0];
  for (let i = 0; i < 2; i++) {
    const angle = (Math.PI / 4) * (i - 0.5);
    const speed = Math.sqrt(baseBall.vx * baseBall.vx + baseBall.vy * baseBall.vy) || 5;
    game.balls.push({
      x: baseBall.x,
      y: baseBall.y,
      r: 6,
      vx: speed * Math.cos(angle),
      vy: speed * Math.sin(angle),
      launched: true,
      trail: []
    });
  }
}

function fireLaser() {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      if (game) {
        game.lasers.push({
          x: game.paddle.x + game.paddle.w / 2 + (i - 1) * 18,
          y: game.paddle.y,
          vy: -12,
          w: 3,
          h: 15
        });
        playLaser();
      }
    }, i * 60);
  }
}

function createParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    game.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 30,
      color,
      size: Math.random() * 3 + 1
    });
  }
}

function gameOver(victory) {
  game.running = false;
  controls.style.display = 'none';
  bossHp.style.display = 'none';
  stopMusic();
  setTimeout(() => {
    menu.style.display = 'flex';
    menu.querySelector('.title').textContent = victory? 'VICTORY' : 'GAME OVER';
    menu.querySelector('.subtitle').textContent = `FINAL SCORE: ${game.score}`;
  }, 300);
}

function update() {
  if (!game ||!game.running) return;

  if (leftPressed) game.paddle.x = Math.max(0, game.paddle.x - game.paddle.speed);
  if (rightPressed) game.paddle.x = Math.min(c.width - game.paddle.w, game.paddle.x + game.paddle.speed);

  game.balls = game.balls.filter(ball => {
    if (!ball.launched) {
      ball.x = game.paddle.x + game.paddle.w / 2;
      ball.y = game.paddle.y - ball.r - 2;
      return true;
    }

    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 8) ball.trail.shift();

    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.x - ball.r <= 0) {
      ball.x = ball.r;
      ball.vx = Math.abs(ball.vx);
      playHit();
    }
    if (ball.x + ball.r >= c.width) {
      ball.x = c.width - ball.r;
      ball.vx = -Math.abs(ball.vx);
      playHit();
    }
    if (ball.y - ball.r <= 0) {
      ball.y = ball.r;
      ball.vy = Math.abs(ball.vy);
      playHit();
    }

    if (ball.y + ball.r >= game.paddle.y &&
        ball.x >= game.paddle.x &&
        ball.x <= game.paddle.x + game.paddle.w &&
        ball.vy > 0) {
      const hitPos = (ball.x - game.paddle.x) / game.paddle.w;
      const angle = (hitPos - 0.5) * 1.3;
      const speed = 5.5 + game.level * 0.3;
      ball.vx = speed * Math.sin(angle);
      ball.vy = -speed * Math.cos(angle);
      ball.y = game.paddle.y - ball.r - 1;
      playHit();
    }

    if (ball.y - ball.r > c.height) {
      return false;
    }

    for (let i = 0; i < game.bricks.length; i++) {
      const b = game.bricks[i];
      if (!b.alive) continue;
      if (ball.x + ball.r > b.x &&
          ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y &&
          ball.y - ball.r < b.y + b.h) {

        b.hp--;
        if (b.hp <= 0) {
          b.alive = false;
          game.score += 10;
          updateUI();
          createParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);
          spawnPowerUp(b.x + b.w / 2, b.y + b.h);
        } else {
          game.score += 5;
          updateUI();
          createParticles(ball.x, ball.y, b.color, 4);
        }
        playBreak();

        const prevX = ball.x - ball.vx;
        if (prevX + ball.r <= b.x || prevX - ball.r >= b.x + b.w) {
          ball.vx *= -1;
        } else {
          ball.vy *= -1;
        }
        ball.x += ball.vx;
        ball.y += ball.vy;
        break;
      }
    }

    if (game.boss && game.boss.alive) {
      if (ball.x + ball.r > game.boss.x &&
          ball.x - ball.r < game.boss.x + game.boss.w &&
          ball.y + ball.r > game.boss.y &&
          ball.y - ball.r < game.boss.y + game.boss.h) {
        game.boss.hp--;
        game.score += 50;
        updateUI();
        updateBossHp();
        playBreak();
        createParticles(ball.x, ball.y, '#ff00ff', 12);
        ball.vy *= -1;
        ball.y += ball.vy;
        if (game.boss.hp <= 0) {
          game.boss.alive = false;
          bossHp.style.display = 'none';
          game.score += 500;
          updateUI();
          createParticles(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#ff00ff', 30);
          gameOver(true);
        }
      }
    }

    return true;
  });

  if (game.balls.length === 0 && game.running) {
    game.lives--;
    updateUI();
    playDamage();
    if (game.lives <= 0) {
      gameOver(false);
      return;
    }
    resetBalls();
    return;
  }

  if (game.boss && game.boss.alive) {
    game.boss.x += game.boss.dir * 2.5;
    if (game.boss.x <= 10 || game.boss.x + game.boss.w >= c.width - 10) game.boss.dir *= -1;
  }

  if (game.level < 5 && game.bricks.every(b =>!b.alive)) {
    game.level++;
    updateUI();
    createLevel();
    resetBalls();
  }

  game.powerups = game.powerups.filter(p => {
    p.y += p.vy;
    if (p.y > game.paddle.y &&
        p.x + p.w > game.paddle.x &&
        p.x < game.paddle.x + game.paddle.w) {
      playPowerUp();
      if (p.type === 'L') fireLaser();
      if (p.type === 'M') spawnMultiball();
      return false;
    }
    return p.y < c.height;
  });

  game.lasers = game.lasers.filter(l => {
    l.y += l.vy;
    for (let i = 0; i < game.bricks.length; i++) {
      const b = game.bricks[i];
      if (!b.alive) continue;
      if (l.x > b.x && l.x < b.x + b.w && l.y > b.y && l.y < b.y + b.h) {
        b.hp--;
        if (b.hp <= 0) {
          b.alive = false;
          game.score += 10;
          createParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 5);
        } else {
          game.score += 5;
        }
        updateUI();
        return false;
      }
    }
    if (game.boss && game.boss.alive &&
        l.x > game.boss.x && l.x < game.boss.x + game.boss.w &&
        l.y > game.boss.y && l.y < game.boss.y + game.boss.h) {
      game.boss.hp--;
      updateBossHp();
      createParticles(l.x, l.y, '#ff00ff', 6);
      if (game.boss.hp <= 0) {
        game.boss.alive = false;
        bossHp.style.display = 'none';
        game.score += 500;
        updateUI();
        gameOver(true);
      }
      return false;
    }
    return l.y > 0;
  });

  game.particles = game.particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life--;
    return p.life > 0;
  });
}
